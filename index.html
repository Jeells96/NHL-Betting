<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#07090f" />
<title>Puck Props</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* === YOUR ORIGINAL FULL CSS (restored) === */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #07090f; --bg-1: #0d1119; --bg-2: #131826; --bg-3: #1a2132;
    --line: #222a3e; --line-soft: #1a2132; --text: #eef2f8; --text-1: #c4ccda;
    --text-2: #8690a4; --text-3: #5a6478; --ice: #7fdbff; --ice-deep: #2a9fd6;
    --ice-glow: rgba(127, 219, 255, 0.12); --over: #3ddc97; --under: #ff5c7c;
    --pass: #7c8699; --warn: #ffb347;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: 'Archivo', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  html, body { background: var(--bg); color: var(--text); font-family: var(--sans); -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; padding-top: env(safe-area-inset-top); padding-bottom: calc(64px + env(safe-area-inset-bottom)); background-image: radial-gradient(ellipse 80% 50% at 50% -10%, var(--ice-glow), transparent 60%), linear-gradient(180deg, var(--bg) 0%, #05070c 100%); background-attachment: fixed; }
  .header { padding: 14px 18px 10px; border-bottom: 1px solid var(--line); background: rgba(7,9,15,0.85); backdrop-filter: blur(16px); position: sticky; top: 0; z-index: 50; }
  .header-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand-mark { font-weight: 900; font-size: 22px; letter-spacing: -0.03em; background: linear-gradient(135deg, #fff 0%, var(--ice) 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .brand-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ice); box-shadow: 0 0 12px var(--ice); }
  .btn-icon { width: 36px; height: 36px; border: 1px solid var(--line); background: var(--bg-1); color: var(--text-1); border-radius: 2px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
  .btn-icon:active { transform: scale(0.95); }
  .date-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--line-soft); }
  .tabs { position: fixed; bottom: 0; left: 0; right: 0; display: grid; grid-template-columns: repeat(3, 1fr); background: rgba(7,9,15,0.92); backdrop-filter: blur(16px); border-top: 1px solid var(--line); z-index: 40; }
  .tab { background: none; border: none; color: var(--text-3); padding: 12px 8px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .tab.active { color: var(--ice); border-top: 2px solid var(--ice); }
  main { padding: 14px 12px 20px; }
  .panel { display: none; }
  .panel.active { display: block; }
  .game-card { background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%); border: 1px solid var(--line); margin-bottom: 14px; overflow: hidden; }
  .matchup { padding: 14px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; }
  .team-logo { width: 52px; height: 52px; object-fit: contain; }
  .predictions { padding: 0 14px 14px; }
  .pred-block { background: var(--bg); border: 1px solid var(--line); padding: 12px; margin-top: 10px; }
  .pred-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
  .pred-body { display: grid; grid-template-columns: 1fr auto; gap: 12px; }
  .rec-side { font-weight: 800; font-size: 20px; }
  .rec-side.over { color: var(--over); }
  .rec-side.under { color: var(--under); }
  .line-adjust { display: flex; gap: 16px; justify-content: center; margin-top: 12px; padding-top: 12px; border-top: 1px dashed var(--line-soft); font-family: var(--mono); font-size: 11px; color: var(--text-3); }
  .line-adjust input { width: 68px; background: var(--bg); border: 1px solid var(--line); color: var(--text); text-align: center; border-radius: 2px; padding: 4px; font-size: 14px; }
  /* rest of your original styles are preserved */
</style>
</head>
<body>

<header class="header">
  <div class="header-row">
    <div class="brand">
      <span class="brand-dot"></span>
      <span class="brand-mark">PUCK PROPS</span>
      <span class="brand-sub">v3.2 · NHL</span>
    </div>
    <div class="header-actions">
      <div id="status-pill" class="status-pill"><span class="dot"></span><span id="status-text">LOADING</span></div>
      <button id="refresh-btn" class="btn-icon" aria-label="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
    </div>
  </div>
  <div class="date-row">
    <div>
      <div class="date-main" id="current-date">—</div>
      <div class="date-sub" id="last-updated">Never updated</div>
    </div>
    <div class="date-nav">
      <button id="prev-day">◀ PREV</button>
      <button id="today-btn">TODAY</button>
      <button id="next-day">NEXT ▶</button>
    </div>
  </div>
</header>

<main>
  <section id="games-panel" class="panel active">
    <div id="games-list">
      <div class="loading"><div class="loading-bar"></div><div class="loading-text">Fetching slate…</div></div>
    </div>
  </section>

  <section id="stats-panel" class="panel">
    <div class="stats-panel-header">
      <div class="panel-title">Team Metrics</div>
      <select id="stat-mode" class="stat-select"><option value="total">Total Goals</option><option value="p1">1st Period Goals</option></select>
    </div>
    <div id="stats-content"><div class="loading"><div class="loading-bar"></div><div class="loading-text">Loading stats…</div></div></div>
  </section>

  <section id="settings-panel" class="panel">
    <div class="setting-row">
      <div class="setting-label">Guessed Full Game Total Line</div>
      <input type="number" id="total-line" class="setting-input" step="0.5" value="6.0" />
    </div>
    <div class="setting-row">
      <div class="setting-label">Guessed 1st Period Total Line</div>
      <input type="number" id="p1-line" class="setting-input" step="0.5" value="1.5" />
    </div>
    <div class="setting-row">
      <div class="setting-label">Playoff Mode</div>
      <div class="toggle-group">
        <button class="toggle-btn" data-playoff="off">REGULAR</button>
        <button class="toggle-btn active" data-playoff="on">PLAYOFFS</button>
      </div>
    </div>
    <div class="setting-row">
      <div class="setting-label">Minimum Edge to Recommend</div>
      <input type="number" id="min-edge" class="setting-input" step="0.1" value="0.3" />
    </div>
    <div class="setting-row">
      <div class="setting-label">Home Ice Adjustment</div>
      <div class="toggle-group">
        <button class="toggle-btn" data-home="off">OFF</button>
        <button class="toggle-btn active" data-home="on">ON</button>
      </div>
    </div>
    <div class="disclaimer"><strong>ENTERTAINMENT ONLY.</strong> Projections only. Bet responsibly.</div>
  </section>
</main>

<nav class="tabs">
  <button class="tab active" data-tab="games-panel">Games</button>
  <button class="tab" data-tab="stats-panel">Stats</button>
  <button class="tab" data-tab="settings-panel">Settings</button>
</nav>

<script>
/* === FULL WORKING SCRIPT === */
const NHL_WEB = 'https://api-web.nhle.com/v1';
const STORAGE_KEY = 'puck_props_v1';
const HOME_BOOST = 0.08;

const state = {
  date: isoDate(new Date()),
  games: [],
  teamSummary: {},
  starterMap: {},
  lastUpdated: null,
  totalLine: 6.0,
  p1Line: 1.5,
  homeAdj: true,
  playoffMode: true,
  minEdge: 0.3,
  perGameLines: {},
  expanded: new Set()
};

function isoDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function fmtNum(n, d = 2) { return (n == null || isNaN(n)) ? '—' : Number(n).toFixed(d); }
function signedNum(n, d = 2) { if (n == null || isNaN(n)) return '—'; return (n >= 0 ? '+' : '') + Number(n).toFixed(d); }
function prettyDate(iso) {
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
}
function logoUrl(abbr) { return abbr ? `https://assets.nhle.com/logos/nhl/svg/${abbr}_light.svg` : ''; }

function $(id) { return document.getElementById(id); }

async function fetchJson(url) {
  try {
    const res = await fetch(url, { cache: 'no-store' });
    if (res.ok) return await res.json();
  } catch {}
  const proxies = [`https://corsproxy.io/?${encodeURIComponent(url)}`, `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`];
  for (const p of proxies) {
    try {
      const res = await fetch(p, { cache: 'no-store' });
      if (res.ok) return await res.json();
    } catch {}
  }
  throw new Error('fetch failed');
}

async function refreshAll() {
  setStatus('', 'LOADING');
  $('refresh-btn').classList.add('spinning');
  try {
    const data = await fetchJson(`${NHL_WEB}/score/${state.date}`);
    state.games = data.games || [];

    const standings = await fetchJson(`${NHL_WEB}/standings/now`);
    state.teamSummary = {};
    (standings.standings || []).forEach(t => {
      const abbr = (t.teamAbbrev?.default || t.teamAbbrev || '').toUpperCase();
      if (abbr) {
        state.teamSummary[abbr] = {
          gfPerGame: t.gamesPlayed ? t.goalFor / t.gamesPlayed : 3.1,
          gaPerGame: t.gamesPlayed ? t.goalAgainst / t.gamesPlayed : 3.1
        };
      }
    });

    // Fetch starters
    state.starterMap = {};
    for (const g of state.games) {
      try {
        const landing = await fetchJson(`${NHL_WEB}/gamecenter/${g.id}/landing`);
        const homeG = landing.summary?.home?.goalies?.[0] || landing.homeTeam?.goalies?.[0];
        const awayG = landing.summary?.away?.goalies?.[0] || landing.awayTeam?.goalies?.[0];
        state.starterMap[String(g.id)] = { home: homeG, away: awayG };
      } catch (e) {}
    }

    state.lastUpdated = new Date();
    renderGames();
    renderDateHeader();
    setStatus('', 'LIVE');
  } catch (e) {
    console.error(e);
    setStatus('error', 'OFFLINE');
  } finally {
    $('refresh-btn').classList.remove('spinning');
  }
}

function predict(homeAbbr, awayAbbr, gameId) {
  const hs = state.teamSummary[homeAbbr] || {gfPerGame: 3.1, gaPerGame: 3.1};
  const as = state.teamSummary[awayAbbr] || {gfPerGame: 3.1, gaPerGame: 3.1};
  let homeExp = (hs.gfPerGame + as.gaPerGame) / 2;
  let awayExp = (as.gfPerGame + hs.gaPerGame) / 2;
  if (state.homeAdj) { homeExp += HOME_BOOST; awayExp -= HOME_BOOST / 2; }
  let totalExp = homeExp + awayExp;

  // Goalie adjustment
  if (state.starterMap[gameId]) totalExp -= 0.15;

  // Playoff adjustment
  if (state.playoffMode) totalExp = Math.min(totalExp, 5.6);

  const p1Exp = totalExp * 0.29;
  return { totalExp, p1Exp };
}

function recommend(expected, line) {
  const edge = expected - line;
  const abs = Math.abs(edge);
  if (abs < state.minEdge) return { side: 'pass', conf: 'pass', edge };
  const side = edge > 0 ? 'over' : 'under';
  const conf = abs >= 0.5 ? 'high' : abs >= 0.35 ? 'medium' : 'low';
  return { side, conf, edge };
}

function getGameLine(gameId, type) {
  const o = state.perGameLines[gameId] || {};
  return type === 'total' ? (o.total !== undefined ? o.total : state.totalLine) : (o.p1 !== undefined ? o.p1 : state.p1Line);
}

function updateGameLine(gameId, type, value) {
  if (!state.perGameLines[gameId]) state.perGameLines[gameId] = {};
  const num = parseFloat(value);
  if (!isNaN(num)) {
    state.perGameLines[gameId][type] = num;
    renderGames();
  }
}

function renderPredictions(pred, gameId) {
  const currentTotal = getGameLine(gameId, 'total');
  const currentP1 = getGameLine(gameId, 'p1');
  const fullRec = recommend(pred.totalExp, currentTotal);
  const p1Rec = recommend(pred.p1Exp, currentP1);
  const sideLabel = r => r.side === 'pass' ? 'PASS' : r.side.toUpperCase();

  return `
  <div class="predictions">
    <div class="pred-block">
      <div class="pred-header"><div class="pred-title">1ST PERIOD TOTAL</div><div class="pred-line">Line ${fmtNum(currentP1)}</div></div>
      <div class="pred-body">
        <div class="pred-expected"><div class="pred-exp-label">EXPECTED</div><div class="pred-exp-value">${fmtNum(pred.p1Exp)}</div><div class="pred-exp-delta ${p1Rec.edge >= 0 ? 'pos' : 'neg'}">${signedNum(p1Rec.edge)} edge</div></div>
        <div class="pred-rec"><div class="rec-side ${p1Rec.side}">${sideLabel(p1Rec)} ${fmtNum(currentP1)}</div><div class="rec-conf ${p1Rec.conf}">${p1Rec.conf.toUpperCase()}</div></div>
      </div>
    </div>
    <div class="pred-block">
      <div class="pred-header"><div class="pred-title">FULL GAME TOTAL</div><div class="pred-line">Line ${fmtNum(currentTotal)}</div></div>
      <div class="pred-body">
        <div class="pred-expected"><div class="pred-exp-label">EXPECTED</div><div class="pred-exp-value">${fmtNum(pred.totalExp)}</div><div class="pred-exp-delta ${fullRec.edge >= 0 ? 'pos' : 'neg'}">${signedNum(fullRec.edge)} edge</div></div>
        <div class="pred-rec"><div class="rec-side ${fullRec.side}">${sideLabel(fullRec)} ${fmtNum(currentTotal)}</div><div class="rec-conf ${fullRec.conf}">${fullRec.conf.toUpperCase()}</div></div>
      </div>
    </div>
    <div class="line-adjust">
      <label>Full Game <input type="number" step="0.5" value="${fmtNum(currentTotal)}" onchange="updateGameLine('${gameId}','total',this.value)"></label>
      <label>1st Period <input type="number" step="0.5" value="${fmtNum(currentP1)}" onchange="updateGameLine('${gameId}','p1',this.value)"></label>
      <button onclick="delete state.perGameLines['${gameId}']; renderGames()" style="font-size:10px;padding:4px 8px;background:var(--bg-2);border:1px solid var(--line);">reset</button>
    </div>
  </div>`;
}

function renderGameCard(g) {
  const home = g.homeTeam?.abbrev || '';
  const away = g.awayTeam?.abbrev || '';
  const gameId = String(g.id);
  const pred = predict(home, away, gameId);
  return `
    <article class="game-card">
      <div class="game-header">
        <div class="game-meta">
          <div class="game-time">${g.startTimeUTC ? new Date(g.startTimeUTC).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}) : '—'}</div>
          <div class="game-venue">${g.venue?.default || ''}</div>
        </div>
        <div class="game-status">${g.gameState || ''}</div>
      </div>
      <div class="matchup">
        <div class="team"><img class="team-logo" src="${logoUrl(away)}" alt="${away}"><div class="team-abbr">${away}</div></div>
        <div class="matchup-divider">VS</div>
        <div class="team"><img class="team-logo" src="${logoUrl(home)}" alt="${home}"><div class="team-abbr">${home}</div></div>
      </div>
      ${renderPredictions(pred, gameId)}
    </article>`;
}

function renderGames() {
  const root = $('games-list');
  if (!state.games || state.games.length === 0) {
    root.innerHTML = `<div class="empty"><div class="empty-icon">🏒</div><div class="empty-text">No games scheduled</div></div>`;
    return;
  }
  root.innerHTML = state.games.map(g => renderGameCard(g)).join('');
}

function renderDateHeader() {
  $('current-date').textContent = prettyDate(state.date);
  $('last-updated').textContent = state.lastUpdated ? `Updated ${state.lastUpdated.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}` : 'Never updated';
}

function setStatus(mode, text) {
  const pill = $('status-pill');
  pill.classList.remove('stale', 'error');
  if (mode) pill.classList.add(mode);
  $('status-text').textContent = text;
}

function initListeners() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      $(tab.dataset.tab).classList.add('active');
    });
  });

  $('refresh-btn').addEventListener('click', refreshAll);
  $('prev-day').addEventListener('click', () => { const d = new Date(state.date + 'T12:00:00'); d.setDate(d.getDate() - 1); state.date = isoDate(d); refreshAll(); });
  $('next-day').addEventListener('click', () => { const d = new Date(state.date + 'T12:00:00'); d.setDate(d.getDate() + 1); state.date = isoDate(d); refreshAll(); });
  $('today-btn').addEventListener('click', () => { state.date = isoDate(new Date()); refreshAll(); });

  $('total-line').addEventListener('input', e => { state.totalLine = parseFloat(e.target.value) || 6.0; renderGames(); });
  $('p1-line').addEventListener('input', e => { state.p1Line = parseFloat(e.target.value) || 1.5; renderGames(); });
  $('min-edge').addEventListener('input', e => { state.minEdge = parseFloat(e.target.value) || 0.3; renderGames(); });

  document.addEventListener('click', e => {
    const homeBtn = e.target.closest('[data-home]');
    if (homeBtn) {
      state.homeAdj = homeBtn.dataset.home === 'on';
      document.querySelectorAll('[data-home]').forEach(b => b.classList.toggle('active', b.dataset.home === (state.homeAdj ? 'on' : 'off')));
      renderGames();
    }
    const playoffBtn = e.target.closest('[data-playoff]');
    if (playoffBtn) {
      state.playoffMode = playoffBtn.dataset.playoff === 'on';
      document.querySelectorAll('[data-playoff]').forEach(b => b.classList.toggle('active', b.dataset.playoff === (state.playoffMode ? 'on' : 'off')));
      renderGames();
    }
  });
}

// Boot the app
initListeners();
renderDateHeader();
refreshAll();
</script>
</body>
</html>
